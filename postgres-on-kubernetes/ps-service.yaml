apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres-local
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-writer
  namespace: postgres-local
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    statefulset.kubernetes.io/pod-name: postgres-0
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-reader
  namespace: postgres-local
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    statefulset.kubernetes.io/pod-name: postgres-1
