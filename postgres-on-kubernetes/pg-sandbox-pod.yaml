apiVersion: v1
kind: Pod
metadata:
  name: pg-sandbox
  namespace: postgres-local
  labels:
    app: pg-sandbox
spec:
  containers:
    - name: pg-sandbox
      image: alpine:3.20
      command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache postgresql-client >/tmp/apk.log 2>&1
          sleep infinity
      env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: PGDATABASE
          value: playground
        # Convenience aliases for each service
        - name: WRITER_HOST
          value: postgres-writer.postgres-local.svc.cluster.local
        - name: READER_HOST
          value: postgres-reader.postgres-local.svc.cluster.local
        - name: HEADLESS_HOST
          value: postgres.postgres-local.svc.cluster.local
  restartPolicy: Never
